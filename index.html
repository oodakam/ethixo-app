
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ethixo — Learn to answer with Clarity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root{
    --brand:#00A86B; --brand-dark:#00875A; --brand-deep:#046B4A;
    --brand-light:#E3F5EC; --brand-light-b:#BFE9D4;
    --ink:#182420; --muted:#5E6D66;
    --amber:#C9821F; --amber-bg:#FBF0DE;
    --bg:#EAEAEA; --card:#FFFFFF; --border:#DBDFDC; --panel:#E2E4E2;
    --radius:18px; --shadow:0 4px 18px rgba(24,36,32,.07);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Montserrat',sans-serif;display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;}
  h1,h2,h3,.logo{font-family:'Montserrat',sans-serif;}
  #app{max-width:920px;margin:0 auto;padding:30px 20px 24px;width:100%;flex:1 0 auto;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px;}
  .logo{font-weight:800;font-size:27px;color:var(--brand);letter-spacing:-.5px;cursor:pointer;}
  .badge{font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:3px 11px;background:var(--card);font-weight:600;}
  .topbtns{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .vault-link{border:1.5px solid var(--brand);color:var(--brand-deep);background:#fff;border-radius:11px;padding:8px 15px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;}
  .vault-link:hover{background:var(--brand-light);}
  .crumb{color:var(--muted);font-size:13.5px;margin-bottom:18px;font-weight:500;}
  .crumb b{color:var(--ink);}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px;}
  .center{text-align:center;}
  h1.title{font-size:27px;color:var(--ink);margin:0 0 6px;font-weight:700;}
  p.sub{color:var(--muted);margin:0 0 26px;font-size:15px;}
  .grid{display:grid;gap:16px;}
  .grid.cols2{grid-template-columns:1fr 1fr;}
  .grid.cols3{grid-template-columns:repeat(3,1fr);}
  @media(max-width:640px){.grid.cols3{grid-template-columns:1fr;}}
  @media(max-width:480px){.grid.cols2{grid-template-columns:1fr;}}
  .choice{border:2px solid var(--border);border-radius:16px;padding:22px;text-align:center;cursor:pointer;background:#fff;transition:.15s;position:relative;}
  .choice:hover{border-color:var(--brand-light-b);}
  .choice.selected{border-color:var(--brand);background:var(--brand-light);}
  .choice .tag{position:absolute;top:10px;right:10px;font-size:10px;background:var(--amber-bg);color:var(--amber);padding:3px 8px;border-radius:10px;font-weight:700;}
  .choice .emoji{font-size:34px;display:block;margin-bottom:10px;}
  .choice h3{margin:4px 0 2px;font-size:17px;color:var(--ink);}
  .choice p{margin:0;color:var(--muted);font-size:12.5px;}
  .btn{border:none;border-radius:12px;padding:13px 22px;font-weight:700;font-size:14.5px;cursor:pointer;font-family:'Montserrat',sans-serif;transition:.15s;}
  .btn:disabled{opacity:.45;cursor:not-allowed;}
  .btn-primary{background:linear-gradient(120deg,var(--brand),var(--brand-dark));color:#fff;}
  .btn-primary:hover:not(:disabled){filter:brightness(1.06);}
  .btn-outline{background:#fff;border:1.5px solid var(--brand);color:var(--brand-deep);}
  .btn-outline:hover:not(:disabled){background:var(--brand-light);}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--border);}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .row.between{justify-content:space-between;align-items:center;}
  .row.end{justify-content:flex-end;}
  @media(max-width:480px){.row.between{flex-direction:column-reverse;align-items:stretch;}.row.between .btn, .row.end .btn{width:100%;}.row .btn{flex:1;}}
  .chapter{border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;}
  .chapter-head{background:var(--panel);padding:14px 18px;font-weight:700;color:var(--ink);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:14.5px;}
  .chapter-head.locked{cursor:not-allowed;opacity:.6;}
  .lesson-row{padding:14px 18px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:#fff;}
  .lesson-row:hover{background:var(--brand-light);}
  .lesson-row .lt{font-weight:600;color:var(--ink);font-size:14.5px;}
  .lesson-row .lc{color:var(--muted);font-size:12px;}
  .qrow{display:flex;align-items:center;gap:14px;padding:14px 6px;border-bottom:1px solid var(--border);cursor:pointer;flex-wrap:wrap;}
  .qrow:hover{background:var(--brand-light);border-radius:10px;}
  .qnum{width:26px;height:26px;border-radius:50%;background:var(--brand-deep);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none;}
  .qtext{flex:1;font-size:14.5px;min-width:180px;}
  .qmeta{color:var(--muted);font-size:11.5px;margin-top:2px;}
  .status{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
  .status.done{background:var(--brand-light);color:var(--brand-deep);}
  .status.almost{background:#E3EEFB;color:#1D5A9E;}
  .status.review{background:var(--amber-bg);color:var(--amber);}
  .status.none{background:#eee;color:#888;}
  textarea{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:14px;font-family:'Montserrat',sans-serif;font-size:14.5px;resize:vertical;min-height:130px;}
  textarea:focus,input:focus,.choice:focus-visible,.btn:focus-visible{outline:3px solid var(--brand-light-b);outline-offset:1px;}
  input[type=range]{width:100%;accent-color:var(--brand);}
  label.field{font-weight:700;color:var(--ink);font-size:13.5px;display:block;margin:16px 0 6px;}
  .qpanel{background:var(--brand-light);border:1px solid var(--brand-light-b);border-radius:14px;padding:16px 18px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
  .qpanel b{color:var(--brand-deep);}
  .loading{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:14px;padding:20px 0;}
  .spinner{width:18px;height:18px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .gaugewrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap;margin-bottom:20px;}
  .scoretext{font-size:15px;color:var(--muted);}
  .scoretext b{font-size:22px;color:var(--ink);}
  .fb-block{margin-top:18px;}
  .fb-block h4{margin:0 0 8px;font-size:14px;color:var(--ink);display:flex;align-items:center;gap:6px;}
  .fb-list{list-style:none;margin:0;padding:0;}
  .fb-list li{display:flex;gap:8px;padding:6px 0;font-size:14px;line-height:1.4;}
  .fb-list.ok li::before{content:"✓";color:var(--brand-deep);font-weight:800;flex:none;}
  .fb-list.next li::before{content:"↗";color:var(--amber);font-weight:800;flex:none;}
  .history{border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:16px;background:#fbfcfb;}
  .hattempt{display:flex;justify-content:space-between;padding:8px 0;border-top:1px dashed var(--border);font-size:13.5px;}
  .hattempt:first-child{border-top:none;}
  .errbox{background:#fdeceb;border:1px solid #f3c1bd;color:#a33;padding:12px 16px;border-radius:10px;font-size:13.5px;margin:14px 0;}
  .hintbox{background:var(--amber-bg);border:1px solid #efd6a4;color:#8a5c14;padding:12px 16px;border-radius:10px;font-size:13.5px;margin:14px 0;}
  .note{font-size:12px;color:var(--muted);margin-top:22px;text-align:center;}
  .heroart{width:100px;margin:0 auto 18px;display:block;}
  .disabledline{font-size:12px;color:#94A29B;text-align:center;margin-top:6px;}
  .vaultrow{border-bottom:1px solid var(--border);padding:14px 4px;}
  .vaultrow .vq{font-weight:600;font-size:14px;}
  .vaultmeta{color:var(--muted);font-size:12px;margin-top:3px;}
  .checklabel{display:flex;align-items:flex-start;gap:8px;}
  .pricecard{border:2px solid var(--border);border-radius:var(--radius);padding:26px;text-align:center;background:#fff;}
  .pricecard.hi{border-color:var(--brand);background:var(--brand-light);}
  .pricecard .amt{font-size:30px;font-weight:800;color:var(--ink);margin:10px 0;font-family:'Montserrat',sans-serif;}
  .pricecard ul{list-style:none;padding:0;margin:14px 0;text-align:left;font-size:13.5px;color:var(--ink);}
  .pricecard ul li{padding:5px 0;}
  .pricecard ul li::before{content:"✓ ";color:var(--brand-deep);font-weight:800;}
  .site-footer{max-width:920px;margin:0 auto;padding:0 20px 30px;text-align:center;flex-shrink:0;width:100%;box-sizing:border-box;}
  .site-footer .f1{font-size:12px;font-weight:500;color:var(--muted);margin:0;}
  .site-footer .f2{font-size:9.5px;color:#7c847e;margin:4px 0 0;}
  .profile-chip{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:20px;padding:3px 12px 3px 3px;}
  .profile-chip svg{flex:none;border-radius:50%;}
  .profile-chip .pname{font-size:12px;font-weight:700;color:var(--ink);line-height:1.25;}
  .profile-chip .plast{font-size:9.5px;color:var(--muted);line-height:1.25;}
  .dash-hero{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:6px;}
  .dash-hero svg{flex:none;border-radius:18px;}
  .dash-hero .pname2{font-size:20px;font-weight:800;color:var(--ink);}
  .dash-hero .plast2{font-size:13px;color:var(--muted);margin-top:2px;}
  .statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:22px 0;}
  @media(max-width:640px){.statgrid{grid-template-columns:repeat(2,1fr);}}
  .statcard{background:var(--brand-light);border:1px solid var(--brand-light-b);border-radius:12px;padding:14px 8px;text-align:center;}
  .statcard .sval{font-size:19px;font-weight:800;color:var(--brand-deep);}
  .statcard .slabel{font-size:11px;color:var(--muted);margin-top:3px;}
  .overallcard{background:var(--brand-light);border:1px solid var(--brand-light-b);border-radius:16px;padding:22px;text-align:center;margin-bottom:22px;}
  .overallcard .qmeta{font-size:13px;}
  @media print{
    .noprint{display:none!important;}
    body{background:#fff;}
    .card{box-shadow:none;border:none;}
  }
  @media (max-width:480px){
    #app{padding:16px 12px 60px;}
    .card{padding:18px;}
    h1.title{font-size:22px;}
  }
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div id="app"></div>
<footer class="site-footer">

<script>
/* ---------- Data (original placeholder content — dummy, not sourced from any real exam) ---------- */
const SUBJECT_META = {
  EN:{ name:"English", emoji:"📖" },
  SCI:{ name:"Science", emoji:"🔬" },
  SS:{ name:"Social Science", emoji:"🌏" },
};
const LEVEL_LABEL = { P5:"Primary 5", P6:"Primary 6" };

function mkChapter(id, title, lessons, locked){ return { id, title, locked: !!locked, lessons: lessons||[] }; }
function mkLesson(id, title, questions){ return { id, title, questions }; }

const LEVELS = {
  P5: {
    EN: { chapters:[
      mkChapter("ch1","Part 1: Language Use (Grammar, Vocabulary, Editing, Synthesis & Transformation)", [
        mkLesson("1.1","1.1 Grammar: Tenses and Verb Forms", [
          {t:"Complete the sentence with the correct form of the verb in brackets: 'By the time we arrived at the stadium, the match already ___ (start).'", m:1, a:"had started"},
          {t:"Complete the sentence with the correct form of the verb in brackets: 'She ___ (finish) her homework by the time her mother came home.'", m:1, a:"had finished"},
          {t:"Complete the sentence with the correct form of the verb in brackets: 'If I ___ (know) about the storm earlier, I would have cancelled the trip.'", m:1, a:"had known"},
          {t:"Complete the sentence with the correct form of the verb in brackets: 'By next year, I ___ (study) English for six years.'", m:1, a:"will have studied"},
          {t:"Complete the sentence with the correct form of the verb in brackets, making sure it agrees with the subject: 'The news of his success ___ (surprise) everyone in the family.'", m:1, a:"surprises (accept 'surprised' if consistently used in past tense) \u2014 'news' is treated as a singular subject even though it ends in -s."},
        ]),
        mkLesson("1.2","1.2 Grammar: Prepositions and Connectives", [
          {t:"Fill in the blank with the correct preposition: 'The teacher was disappointed ___ the students' poor results.'", m:1, a:"with"},
          {t:"Fill in the blank with the correct preposition: 'She has been living in Singapore ___ 2015.'", m:1, a:"since"},
          {t:"Complete the sentence with a suitable connective: '___ it was raining heavily, the football match continued.'", m:1, a:"Although / Even though"},
          {t:"Complete the sentence with a suitable connective: 'Sarah studied very hard; ___, she failed the test.'", m:1, a:"however"},
        ]),
        mkLesson("1.3","1.3 Vocabulary in Context", [
          {t:"Choose the most suitable word to complete the sentence and explain why it fits best: 'The detective carefully ___ the room for clues.' (searched / observed / glanced)", m:2, a:"searched \u2014 because 'searched for clues' means to look thoroughly and deliberately for something specific, which fits the context better than 'observed' (general watching) or 'glanced' (a very quick look)."},
          {t:"What does the word 'reluctant' mean in this sentence: 'James was reluctant to share his lunch with his sister.'? Use the word 'reluctant' in a new sentence of your own.", m:2, a:"'Reluctant' means unwilling or hesitant to do something. Any grammatically correct sentence that uses 'reluctant' with this meaning should be accepted, e.g. 'I was reluctant to go outside because it was raining heavily.'"},
          {t:"Replace the underlined word with a more suitable and stronger word: 'The story was very sad, and it made everyone cry.'", m:1, a:"Accept any suitable stronger synonym for 'sad', e.g. heart-breaking, tragic, sorrowful, moving."},
          {t:"Fill in the blank with the most suitable word: 'The room was in complete ___ after the party, with cups and plates everywhere.' (chaos / silence / order)", m:1, a:"chaos"},
          {t:"Explain the meaning of the idiom 'to keep an eye on something' and use it correctly in a sentence of your own.", m:2, a:"It means to watch or look after something carefully. Any grammatically correct sentence using the idiom with this meaning should be accepted, e.g. 'Please keep an eye on my bag while I get some water.'"},
        ]),
        mkLesson("1.4","1.4 Editing", [
          {t:"Identify and correct the grammatical error in this sentence: 'Each of the students have completed their project.'", m:2, a:"'Each of the students has completed their project.' (the subject 'each' is singular and takes the singular verb 'has')"},
          {t:"Identify and correct the grammatical error in this sentence: 'My brother and me went to the market yesterday.'", m:2, a:"'My brother and I went to the market yesterday.' (use the subject pronoun 'I', not the object pronoun 'me')"},
          {t:"Identify and correct the grammatical error in this sentence: 'She don't like to eat vegetables.'", m:1, a:"'She doesn't like to eat vegetables.' (the third person singular subject 'she' requires 'doesn't', not 'don't')"},
          {t:"Identify and correct the grammatical error in this sentence: 'There is many reasons why he was late.'", m:1, a:"'There are many reasons why he was late.' (the plural subject 'reasons' requires the plural verb 'are')"},
        ]),
        mkLesson("1.5","1.5 Synthesis and Transformation", [
          {t:"Combine the two sentences into one, using the word given: 'The rain stopped. We continued our walk.' (Use: As soon as)", m:2, a:"As soon as the rain stopped, we continued our walk."},
          {t:"Rewrite the sentence using the word given, without changing its meaning: 'Tom is too young to drive a car.' (Use: so...that)", m:2, a:"Tom is so young that he cannot drive a car."},
          {t:"Combine the two sentences into one, using the word given: 'He was very tired. He finished his homework.' (Use: Although)", m:2, a:"Although he was very tired, he finished his homework."},
          {t:"Rewrite this sentence in reported speech: 'I will call you tomorrow,' Mary said to John.", m:2, a:"Mary said that she would call John the following day (accept: the next day)."},
          {t:"Rewrite the sentence in the passive voice: 'The gardener watered the plants every morning.'", m:2, a:"The plants were watered by the gardener every morning."},
        ]),
      ]),
      mkChapter("ch2","Part 2: Writing Tasks (Situational & Composition)", [
        mkLesson("2.1","2.1 Situational Writing", [
          {t:"Your class is organising a recycling drive at school. Write a notice to inform your classmates about the event, including what items to bring, and when and where to submit them.", m:8, a:"A strong response should include: a clear heading/title for the notice; the purpose of the event stated clearly; specific items that can be recycled; the date, time and drop-off location; a polite closing instruction or note of thanks; simple, clear sentences suitable for a notice."},
          {t:"You borrowed a book from your friend and accidentally spilled water on it. Write a text message to your friend, apologising and explaining what happened, and what you plan to do about it.", m:8, a:"A strong response should include: a friendly, appropriate greeting; a clear and honest explanation of what happened; a sincere apology; a stated plan to make up for it (e.g. replace or repair the book); a polite closing."},
          {t:"Write a diary entry about a day when you helped someone in your neighbourhood. Describe what happened and how it made you feel.", m:10, a:"A strong response should include: an appropriate diary-entry opening (e.g. a date); events recounted in a logical sequence; specific details of how the person was helped; genuine reflection on the writer's own feelings; an informal, personal tone throughout."},
          {t:"Your school is holding a talent show and you would like to invite your parents. Write an email to your parents giving them the details of the event and encouraging them to attend.", m:8, a:"A strong response should include: an appropriate email greeting and closing; clear event details (what, when, where); a genuine reason or encouragement for the parents to attend; a polite and respectful tone suitable for writing to parents."},
          {t:"You saw a younger student being teased by classmates. Write a short note to your teacher describing what you saw and explaining why you think it is important to address it.", m:8, a:"A strong response should include: a clear, factual description of what was observed; an explanation of why the behaviour is a concern; a respectful tone appropriate for writing to a teacher; a suggestion or request for the teacher to take action."},
          {t:"Your neighbour's cat has gone missing. Write a short poster message describing the cat and asking for help finding it.", m:6, a:"A strong response should include: a clear heading (e.g. 'Missing Cat'); a description of the cat's appearance; where and when it was last seen; how to contact the owner if found; a polite request for help."},
        ]),
        mkLesson("2.2","2.2 Composition (Continuous Writing)", [
          {t:"Write a story about a time when you had to make a difficult decision. In your story, explain what the decision was, why it was difficult, and what you learned from it.", m:12, a:"A strong response should include: a clear beginning, middle and end; a well-established situation and the difficult decision faced; descriptive details and, where suitable, dialogue; the character's thoughts and feelings; a clear reflection or lesson learned at the end; correct grammar and varied vocabulary and sentence structures."},
          {t:"Write a story that begins with: 'The old chest in the attic had been locked for years, but today, everything was about to change.'", m:12, a:"A strong response should include: a story that continues logically and creatively from the given opening; a clear plot with a beginning, middle and satisfying end; descriptive language that builds atmosphere or suspense; consistent characters and setting; correct grammar and varied sentence structures; overall creativity and coherence."},
        ]),
      ]),
    ]},
    SCI: { chapters:[
      mkChapter("ch1","Part 1: Cycles", [
        mkLesson("1.1","1.1 Reproduction in Plants", [
          {t:"Name the part of a flower that produces pollen.", m:1, a:"The anther (part of the stamen, the male part of the flower)."},
          {t:"What is the term for the transfer of pollen from the anther to the stigma of a flower?", m:1, a:"Pollination."},
          {t:"Explain what happens during fertilisation in a flowering plant.", m:2, a:"The pollen grain joins with the egg cell inside the ovule of the flower; this joining is called fertilisation, and it allows a seed to eventually form."},
          {t:"Describe ONE way seeds can be dispersed from a plant to a new location.", m:2, a:"Accept any reasonable method: carried by wind; carried by water; carried by animals (e.g. seeds with hooks stick to animal fur, or fruit is eaten and seeds are later excreted elsewhere)."},
          {t:"Explain why flowers usually need to be pollinated before they can produce seeds.", m:2, a:"Pollination allows pollen to reach the stigma, which is needed for fertilisation to take place; without fertilisation, the flower cannot develop into a fruit containing seeds."},
        ]),
        mkLesson("1.2","1.2 Reproduction in Animals", [
          {t:"What is the name of the male reproductive cell that joins with the female egg cell during fertilisation in humans?", m:1, a:"Sperm."},
          {t:"After fertilisation occurs in humans, where does the fertilised egg develop into a baby?", m:1, a:"In the womb (uterus) of the mother."},
          {t:"Describe how a human baby receives nutrients while developing inside the mother's womb.", m:2, a:"The baby receives nutrients and oxygen from the mother through the umbilical cord, which is connected to the placenta."},
          {t:"Explain why sexual reproduction is important for living things, such as humans.", m:2, a:"It allows living things to produce offspring and pass on their characteristics to the next generation, ensuring the continuity of their kind."},
        ]),
        mkLesson("1.3","1.3 Water and Changes of State", [
          {t:"Name the THREE states of matter that water can exist in.", m:1, a:"Solid (ice), liquid (water), and gas (water vapour)."},
          {t:"What is the term for the change of state when liquid water turns into water vapour?", m:1, a:"Evaporation."},

          {t:"Describe what happens to the particles in water when it is heated and eventually boils.", m:2, a:"As water is heated, its particles gain energy and move faster and further apart, until the water changes from a liquid into a gas (water vapour) \u2014 this is boiling."},
        ]),
        mkLesson("1.4","1.4 The Water Cycle", [
          {t:"Name the process by which water from oceans, rivers and lakes turns into water vapour and rises into the air.", m:1, a:"Evaporation."},
          {t:"Describe what happens when water vapour in the atmosphere cools and forms clouds.", m:2, a:"The water vapour condenses into tiny water droplets, which group together in the atmosphere to form clouds."},
          {t:"What is the term for water falling from clouds back to the Earth's surface, such as rain?", m:1, a:"Precipitation."},
          {t:"Explain why the water cycle is important for the Earth's environment.", m:2, a:"The water cycle continuously recycles water between the Earth's surface and the atmosphere, providing fresh water for living things and helping to maintain ecosystems."},
          {t:"Describe ONE way people can help conserve water at home.", m:2, a:"Accept any reasonable example: turning off taps when not in use; fixing leaking pipes; taking shorter showers; reusing water (e.g. for watering plants)."},
        ]),
      ]),
      mkChapter("ch2","Part 2: Systems", [
        mkLesson("2.1","2.1 Plant Transport System", [
          {t:"Name the plant part that absorbs water and minerals from the soil.", m:1, a:"The roots."},

function formatLastActive(ts){
  if(!ts) return "First visit";
  const diff = Date.now() - ts;
  const mins = Math.floor(diff/60000);

  if(mins < 60) return mins+" min ago";

/* ---------- Time tracking (this browser/device only) ---------- */
function todayKey(){ return new Date().toISOString().slice(0,10); }
function addTimeSpent(seconds){
  if(seconds<=0) return;
  const log = sGet("timelog") || {};
  const k = todayKey();
  log[k] = (log[k]||0) + seconds;
  sSet("timelog", log);
}
function getTimeSpent(period){
  const log = sGet("timelog") || {};
  const now = new Date();
  let total = 0;
  Object.keys(log).forEach(function(dateStr){
    const secs = log[dateStr];
    const d = new Date(dateStr+"T00:00:00");
    if(period==="today"){ if(dateStr===todayKey()) total+=secs; }
    else if(period==="week"){ const diffDays=Math.floor((now-d)/86400000); if(diffDays>=0 && diffDays<7) total+=secs; }
    else if(period==="month"){ if(d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth()) total+=secs; }
    else if(period==="year"){ if(d.getFullYear()===now.getFullYear()) total+=secs; }
  });
  return total;
}
function formatDuration(seconds){
  seconds = Math.round(seconds||0);
  const h = Math.floor(seconds/3600), m = Math.floor((seconds%3600)/60);
  if(h>0) return h+"h "+m+"m";
  if(m>0) return m+"m";
  return "<1m";
}
let __lastTick = Date.now();
function startHeartbeat(){
  __lastTick = Date.now();
  setInterval(function(){
    if(document.visibilityState === "visible"){
      const now = Date.now();
      addTimeSpent(Math.round((now-__lastTick)/1000));
      __lastTick = now;
    } else { __lastTick = Date.now(); }
  }, 15000);
  document.addEventListener("visibilitychange", function(){ __lastTick = Date.now(); });
  window.addEventListener("beforeunload", function(){ addTimeSpent(Math.round((Date.now()-__lastTick)/1000)); });
}

/* ---------- Mastery computation (best-score based, independent of ScholarVault save status) ---------- */
function computeMastery(level, subjectKey){
  const subj = LEVELS[level][subjectKey];
  let totalMarks=0, earnedMarks=0, attemptedCount=0, totalCount=0;
  subj.chapters.forEach(function(ch){
    if(ch.locked) return;
    ch.lessons.forEach(function(l){
      l.questions.forEach(function(q, idx){
        totalCount++; totalMarks += q.m;
        const key = "attempts:"+level+":"+subjectKey+":"+l.id+":"+idx;
        const attempts = sGet(key) || [];
        if(attempts.length){
          attemptedCount++;
          let best = 0;
          attempts.forEach(function(a){ const s=attemptScore(a); if(s>best) best=s; });
          earnedMarks += Math.min(best, q.m);
        }
      });
    });
  });
  const pct = totalMarks>0 ? Math.round((earnedMarks/totalMarks)*100) : 0;
  return { pct: pct, earnedMarks: earnedMarks, totalMarks: totalMarks, attemptedCount: attemptedCount, totalCount: totalCount };
}
function computeOverallMastery(level){
  let totalMarks=0, earnedMarks=0;
  ["EN","SCI","SS"].forEach(function(k){
    const m = computeMastery(level, k);
    totalMarks += m.totalMarks; earnedMarks += m.earnedMarks;
  });
  return totalMarks>0 ? Math.round((earnedMarks/totalMarks)*100) : 0;
}

async function viewQBank(){
  const lesson = findLesson();
  const rows = await Promise.all(lesson.questions.map(async (q,idx)=>{
    const qObj = { id:String(idx), level:state.level, subjectKey:state.subjectKey, lessonId:lesson.id, t:q.t, m:q.m };
    const key = qKey(qObj);
    const attempts = (await sGet(key)) || [];
    const savedInVault = state.vault.some(v=>v.qid===key);
    let status = "none", label="Not Attempted";
    if(attempts.length){
      let best = 0;
      attempts.forEach(a=>{ const s=attemptScore(a); if(s>best) best=s; });
      const pct = best / q.m;
      const attemptsLabel = attempts.length+" attempt"+(attempts.length>1?"s":"");
      if(pct >= 1 || savedInVault){ status="done"; label="Completed · "+attemptsLabel; }
      else if(pct >= 0.75){ status="almost"; label="Almost There · "+attemptsLabel; }
      else { status="review"; label="Needs Review · "+attemptsLabel; }
    }
    return '<div class="qrow" onclick="selectBankQuestion('+idx+')">'+
      '<div class="qnum">'+(idx+1)+'</div>'+
      '<div class="qtext">'+q.t+'<div class="qmeta">'+q.m+' Mark'+(q.m>1?"s":"")+'</div></div>'+
      '<div class="status '+status+'">'+label+'</div>'+
    '</div>';
  }));
  window.__lessonForBank = lesson;
  return '<div class="crumb"><b>'+LEVEL_LABEL[state.level]+'</b> › <b>'+SUBJECT_META[state.subjectKey].name+'</b> › <b>'+lesson.title+'</b></div>'+

}

    (state.error? '<div class="hintbox">'+state.error+'</div>':"")+
    '<div class="row between" style="margin-top:20px;">'+
      '<div class="row">'+
        '<button class="btn btn-ghost" onclick="goto(\'qbank\')">Back to Questions</button>'+
        '<button class="btn btn-ghost" onclick="goto(\'subject\')">Change Subject</button>'+
      '</div>'+
      '<button class="btn btn-primary" onclick="startCustom()">'+(state.validating?"Checking…":"Start Writing")+'</button>'+
    '</div>'+
    (state.validating? '<div class="loading"><div class="spinner"></div>Ethixo is checking your question…</div>':"")+
  '</div>';
}
async function startCustom(){
  const t = document.getElementById("customText").value.trim();
  if(!t){ toast("Please type a question first"); return; }
  const m = parseInt(document.getElementById("marksSlider").value,10);
  state.customDraft = t; state.customMarks = m;
  const lesson = findLesson();
  state.validating = true; state.error = null; render();
  try{
    const check = await validateCustomQuestion(SUBJECT_META[state.subjectKey].name, lesson.title, t);
    state.validating = false;
    if(!check.ok){
      state.error = check.message || "Please adjust your question and try again.";
      render();
      return;
    }
    state.currentQuestion = { id:"custom-"+Date.now(), level:state.level, subjectKey:state.subjectKey, lessonId:lesson.id, lessonTitle:lesson.title, t, m, custom:true };
    state.answerDraft = ""; state.customDraft = ""; state.error = null;
    goto("answer");
  }catch(e){
    state.validating = false;
    state.error = "Couldn't check your question right now. ("+e.message+")";
    render();
  }
}

/* ---- Answer ---- */
function viewAnswer(){
  const q = state.currentQuestion;
  return '<div class="crumb"><b>'+LEVEL_LABEL[q.level]+'</b> › <b>'+SUBJECT_META[q.subjectKey].name+'</b> › <b>'+q.lessonTitle+'</b></div>'+
  '<div class="card">'+
    '<h1 class="title">Write your Best Answer</h1>'+
    '<p class="qmeta" style="font-size:13px;">'+q.m+' Mark'+(q.m>1?"s":"")+'</p>'+
    '<p style="font-weight:700;color:var(--ink);font-size:16px;">'+q.t+'</p>'+
    '<textarea id="answerBox" placeholder="Type your answer here (in English)…">'+state.answerDraft+'</textarea>'+
    (state.error? '<div class="errbox">'+state.error+' <a href="#" onclick="event.preventDefault();submitAnswer()">Try again</a></div>':"")+
    '<div class="row between" style="margin-top:18px;">'+
      '<div class="row">'+
        '<button class="btn btn-ghost" onclick="goto(\'qbank\')">Back to Questions</button>'+
        '<button class="btn btn-ghost" onclick="goto(\'subject\')">Change Subject</button>'+
      '</div>'+
      '<button class="btn btn-primary" id="reviewBtn" onclick="submitAnswer()">'+(state.loading? "Reviewing…":"Review My Answer")+'</button>'+
    '</div>'+
    (state.loading? '<div class="loading"><div class="spinner"></div>Ethixo is reading your answer…</div>':"")+
  '</div>';
}
async function submitAnswer(){
  const box = document.getElementById("answerBox");
  const ans = box.value.trim();
  if(!ans){ toast("Write an answer first"); return; }
  state.answerDraft = ans; state.loading = true; state.error=null; render();
  try{
    const q = state.currentQuestion;
    const fb = await getAIFeedback(q.t, q.m, ans, q.a);
    state.loading=false;
    if(fb.languageError){
      state.error = fb.message || "Please write your answer in English.";
      render();
      return;
    }
    state.feedback = fb;
    const attempts = (await sGet(qKey(q))) || [];
    attempts.push({ answer:ans, score:fb.score, strengths:fb.strengths, nextSteps:fb.nextSteps, at:Date.now() });
    await sSet(qKey(q), attempts);
    goto("feedback");
  }catch(e){
    state.loading=false; state.error="Couldn't reach Ethixo's AI coach right now. ("+e.message+")"; render();
  }
}

/* ---- Feedback ---- */
function viewFeedback(){
  const q = state.currentQuestion, fb = state.feedback;
  const pct = fb.score / q.m;
  const saveBtn = (pct >= 0.75)
    ? '<button class="btn btn-outline" onclick="addToVault()">⭐ Add to ScholarVault</button>'
    : '<span class="qmeta" style="align-self:center;">Score 75%+ to save to ScholarVault</span>';
  return '<div class="crumb"><b>'+LEVEL_LABEL[q.level]+'</b> › <b>'+SUBJECT_META[q.subjectKey].name+'</b> › <b>'+q.lessonTitle+'</b></div>'+
  '<div class="card">'+
    '<h1 class="title">Your Performance Feedback</h1>'+
    '<p style="font-weight:700;color:var(--ink);">'+q.t+'</p>'+
    '<div class="gaugewrap">'+
      '<svg width="120" height="70" viewBox="0 0 120 70" id="gaugeSvg">'+
        '<path d="M10,65 A50,50 0 0 1 110,65" fill="none" stroke="#e2e5e2" stroke-width="10" stroke-linecap="round"/>'+
        '<path id="gaugeArc" d="M10,65 A50,50 0 0 1 110,65" fill="none" stroke="url(#gg)" stroke-width="10" stroke-linecap="round"/>'+
        '<defs><linearGradient id="gg" x1="0" y1="0" x2="120" y2="0"><stop offset="0" stop-color="#00A86B"/><stop offset="1" stop-color="#046B4A"/></linearGradient></defs>'+
      '</svg>'+
      '<div class="scoretext">Estimated Score<br><b>'+fb.score+' / '+q.m+'</b> Marks</div>'+
    '</div>'+
    '<div class="fb-block"><h4>✅ Strengths</h4><ul class="fb-list ok">'+fb.strengths.map(s=>'<li>'+s+'</li>').join("")+'</ul></div>'+
    '<div class="fb-block"><h4>↗ Next Steps to Strengthen Your Answer</h4><ul class="fb-list next">'+fb.nextSteps.map(s=>'<li>'+s+'</li>').join("")+'</ul></div>'+
    '<div class="row between" style="margin-top:24px;">'+
      '<div class="row">'+
        '<button class="btn btn-ghost" onclick="goto(\'qbank\')">Back to Questions</button>'+
        '<button class="btn btn-ghost" onclick="goto(\'subject\')">Change Subject</button>'+
      '</div>'+
      '<div class="row">'+
        saveBtn+
        '<button class="btn btn-primary" onclick="goto(\'improve\')">Retry Question</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}
function drawGaugeIfPresent(){
  const arc = document.getElementById("gaugeArc");
  if(!arc || !state.feedback) return;
  const q = state.currentQuestion, fb = state.feedback;
  const frac = Math.max(0, Math.min(1, fb.score / q.m));
  const len = 3.14159*50;
  arc.setAttribute("stroke-dasharray", (len*frac)+","+len);
}
async function addToVault(){
  const q = state.currentQuestion, fb = state.feedback;
  const pct = fb.score / q.m;
  if(pct < 0.75){ toast("Score 75%+ needed to save to ScholarVault"); return; }
  if(pct < 0.90){
    const ok = confirm("You're doing well! You could try to improve this further before saving.\n\nSave this as your final answer anyway?");
    if(!ok) return;
  }
  await loadVault();
  const item = { qid:qKey(q), level:q.level, subjectKey:q.subjectKey, lessonTitle:q.lessonTitle, t:q.t, m:q.m, answer:state.answerDraft, score:fb.score, savedAt:Date.now() };
  state.vault = state.vault.filter(v=>v.qid!==item.qid);
  state.vault.push(item);
  await sSet("vault", state.vault);
  toast("Saved to ScholarVault ⭐");
}

/* ---- Improve ---- */
async function viewImprove(){
  const q = state.currentQuestion;
  const attempts = (await sGet(qKey(q))) || [];
  const best = attempts.reduce((a,b)=> (attemptScore(b)>(a?attemptScore(a):-1)? b:a), null);
  const hist = attempts.map((a,i)=>'<div class="hattempt"><span>Attempt '+(i+1)+(i===attempts.length-1?" (Latest)":"")+'</span><span>'+attemptScore(a)+'/'+q.m+'</span></div>').join("");
  return '<div class="crumb"><b>'+LEVEL_LABEL[q.level]+'</b> › <b>'+SUBJECT_META[q.subjectKey].name+'</b> › <b>'+q.lessonTitle+'</b></div>'+
  '<div class="card">'+
    '<h1 class="title">Improve Your Answer</h1>'+
    '<p class="qmeta">Attempts: '+attempts.length+' '+(best? "| Best: "+attemptScore(best)+"/"+q.m:"")+'</p>'+
    '<p style="font-weight:700;color:var(--ink);">'+q.t+'</p>'+
    '<div class="history">'+(hist || '<span class="qmeta">No attempts yet</span>')+'</div>'+
    '<label class="field">Your improved answer</label>'+
    '<textarea id="improveBox" placeholder="Type your answer here (in English)…"></textarea>'+
    (state.error? '<div class="errbox">'+state.error+'</div>':"")+
    '<div class="row between" style="margin-top:18px;">'+
      '<div class="row">'+
        '<button class="btn btn-ghost" onclick="goto(\'qbank\')">Back to Questions</button>'+
        '<button class="btn btn-ghost" onclick="goto(\'subject\')">Change Subject</button>'+
      '</div>'+
      '<button class="btn btn-primary" onclick="submitImprove()">'+(state.loading?"Reviewing…":"Submit My New Answer")+'</button>'+
    '</div>'+
    (state.loading? '<div class="loading"><div class="spinner"></div>Ethixo is reading your answer…</div>':"")+
  '</div>';
}
async function submitImprove(){
  const box = document.getElementById("improveBox");
  const ans = box.value.trim();
  if(!ans){ toast("Write an answer first"); return; }
  state.loading=true; state.error=null; render();
  try{
    const q = state.currentQuestion;
    const fb = await getAIFeedback(q.t, q.m, ans, q.a);
    state.loading=false;
    if(fb.languageError){
      state.error = fb.message || "Please write your answer in English.";
      render();
      return;
    }
    state.feedback = fb; state.answerDraft = ans;
    const attempts = (await sGet(qKey(q))) || [];
    attempts.push({ answer:ans, score:fb.score, strengths:fb.strengths, nextSteps:fb.nextSteps, at:Date.now() });
    await sSet(qKey(q), attempts);
    goto("feedback");
  }catch(e){
    state.loading=false; state.error="Couldn't reach Ethixo's AI coach right now. ("+e.message+")"; render();
  }
}

/* ---- ScholarVault ---- */
function viewVault(){
  const rows = state.vault.slice().reverse().map((v)=>'<div class="vaultrow">'+
      '<label class="checklabel">'+
        '<input type="checkbox" data-qid="'+v.qid+'" onchange="toggleVaultSel(\''+v.qid+'\',this.checked)">'+
        '<div><div class="vq">'+v.t+'</div>'+
        '<div class="vaultmeta">'+LEVEL_LABEL[v.level]+' · '+SUBJECT_META[v.subjectKey].name+' · '+v.lessonTitle+' · '+v.m+' Marks · Score '+attemptScore(v)+' · Saved '+new Date(v.savedAt).toLocaleDateString()+'</div></div>'+
      '</label>'+
    '</div>').join("");
  return '<div class="card">'+
    '<h1 class="title center">ScholarVault</h1>'+
    '<p class="sub center">Your Best Answers. Preserved.</p>'+
    (state.vault.length? rows : '<p class="qmeta center">No saved answers yet — add one from the Feedback screen.</p>')+
    '<div class="row between" style="margin-top:22px;">'+
      '<button class="btn btn-ghost" onclick="history.back()">Back</button>'+
      '<button class="btn btn-primary" onclick="goto(\'printview\')" '+(!state.vault.length?"disabled":"")+'>Generate Revision Notes</button>'+
    '</div>'+
  '</div>';
}
function toggleVaultSel(qid, checked){
  if(checked) state.selectedVaultIds.push(qid);
  else state.selectedVaultIds = state.selectedVaultIds.filter(x=>x!==qid);
}
function viewPrint(){
  const items = state.selectedVaultIds.length? state.vault.filter(v=>state.selectedVaultIds.includes(v.qid)) : state.vault;
  const rows = items.map(v=>'<div style="margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid #ddd;">'+
    '<div style="font-weight:700;color:var(--ink);">'+v.t+' <span style="font-weight:400;color:#888;font-size:12px;">('+v.m+' Marks)</span></div>'+
    '<div style="margin:8px 0;white-space:pre-wrap;">'+v.answer+'</div>'+
    '<div style="font-size:12px;color:#888;">Estimated score: '+attemptScore(v)+'/'+v.m+'</div>'+
  '</div>').join("");
  return '<div class="card">'+
    '<div class="noprint row between" style="margin-bottom:16px;">'+
      '<button class="btn btn-ghost" onclick="history.back()">Back</button>'+
      '<button class="btn btn-primary" onclick="downloadPDF()">⬇ Download PDF</button>'+
    '</div>'+
    '<h1 class="title">Ethixo Revision Notes</h1>'+
    '<p class="sub">Generated '+new Date().toLocaleDateString()+'</p>'+
    (rows || '<p class="qmeta">No answers selected.</p>')+
  '</div>';
}
function downloadPDF(){
  const items = state.selectedVaultIds.length? state.vault.filter(v=>state.selectedVaultIds.includes(v.qid)) : state.vault;
  if(!items.length){ toast("No answers to export"); return; }
  if(!window.jspdf){ toast("PDF library failed to load"); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:"pt", format:"a4" });
  const marginX = 48, pageW = doc.internal.pageSize.getWidth()-96, pageH = doc.internal.pageSize.getHeight();
  let y = 60;
  doc.setFont("helvetica","bold"); doc.setFontSize(20); doc.setTextColor(0,168,107);
  doc.text("Ethixo Revision Notes", marginX, y); y+=16;
  doc.setDrawColor(0,168,107); doc.setLineWidth(2); doc.line(marginX,y,marginX+120,y); y+=22;
  doc.setFont("helvetica","normal"); doc.setFontSize(10); doc.setTextColor(110,110,110);
  doc.text("Generated "+new Date().toLocaleDateString(), marginX, y); y+=28;

  items.forEach((v,i)=>{
    if(y > pageH-120){ doc.addPage(); y=60; }
    doc.setFont("helvetica","bold"); doc.setFontSize(12); doc.setTextColor(24,36,32);
    const qLines = doc.splitTextToSize((i+1)+". "+v.t+"  ("+v.m+" Marks)", pageW);
    doc.text(qLines, marginX, y); y += qLines.length*15 + 4;

    doc.setFont("helvetica","normal"); doc.setFontSize(11); doc.setTextColor(60,70,66);
    const aLines = doc.splitTextToSize(v.answer, pageW);
    if(y + aLines.length*13 > pageH-70){ doc.addPage(); y=60; }
    doc.text(aLines, marginX, y); y += aLines.length*13 + 8;

    doc.setFontSize(9); doc.setTextColor(140,140,140);
    doc.text("Estimated score: "+attemptScore(v)+"/"+v.m, marginX, y); y += 26;
  });
  doc.save("Ethixo-Revision-Notes.pdf");
  toast("PDF downloaded ⬇");
}

/* ---- Dashboard ---- */
function viewDashboard(){
  const overall = computeOverallMastery(state.level);
  const todaySec = getTimeSpent("today"), weekSec = getTimeSpent("week"), monthSec = getTimeSpent("month"), yearSec = getTimeSpent("year");

  const last = sGet("lastLesson");
  const continueBtn = (last && last.level===state.level)

    : '<button class="btn btn-primary" onclick="goto(\'subject\')">Start Practising →</button>';

  return '<div class="card">'+
    '<div class="dash-hero">'+wenboAvatar(72)+
      '<div><div class="pname2">Wenbo Lee</div><div class="plast2">'+LEVEL_LABEL[state.level]+' · Last active: '+state.lastActiveText+'</div></div>'+

      '<div class="statcard"><div class="sval">'+formatDuration(weekSec)+'</div><div class="slabel">This Week</div></div>'+

      '<div class="statcard"><div class="sval">'+formatDuration(yearSec)+'</div><div class="slabel">This Year</div></div>'+
    '</div>'+
    '<div class="overallcard">'+
      '<div class="qmeta" style="margin-bottom:10px;">Overall Mastery</div>'+
      masteryMeterSVG(130, overall)+
    '</div>'+
    '<h3 style="margin:6px 0 12px;color:var(--ink);">By Subject</h3>'+
    '<div style="height:170px;position:relative;margin-bottom:20px;"><canvas id="subjectBarChart" role="img" aria-label="Bar chart comparing mastery percentage across English, Science, and Social Science"></canvas></div>'+
    '<div class="row between">'+
      '<button class="btn btn-ghost" onclick="goto(\'subject\')">All Subjects</button>'+
      continueBtn+
    '</div>'+

}

/* ---- misc ---- */
function attachHandlers(){}
window.goto = goto; window.selectBankQuestion = selectBankQuestion; window.startCustom = startCustom;
window.submitAnswer = submitAnswer; window.addToVault = addToVault; window.submitImprove = submitImprove;
window.toggleVaultSel = toggleVaultSel; window.downloadPDF = downloadPDF; window.chooseLevel = chooseLevel; window.state = state;

(async function init(){
  await loadVault();

  const prevActive = sGet("lastActive");
  state.lastActiveText = formatLastActive(prevActive);
  sSet("lastActive", Date.now());
  startHeartbeat();

  const savedLevel = sGet("chosenLevel");
  if(savedLevel){
    state.level = savedLevel;
    state.view = "dashboard";
  }

  history.replaceState(stateSnapshot(), "", "#"+state.view);
  render();
})();
</script>
